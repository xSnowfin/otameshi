<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イベント詳細</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* イベント詳細専用のちょっとした装飾 */
    .event-meta {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }
    .label {
      background: #e74c3c;
      color: white;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 0.8rem;
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <main class="container">
    <a href="index.html" style="display: inline-block; margin-bottom: 20px;">← 一覧に戻る</a>
    
    <article class="card">
      <h1 id="post-title">イベント情報を読み込み中...</h1>
      
      <div class="event-meta">
        <p><span class="label">開催日</span> <span id="event-date">---</span></p>
      </div>

      <div id="post-body">
        </div>
    </article>
  </main>

  <script>
    // 1. 設定情報（あなたのものに書き換えてください）
    const SERVICE_DOMAIN = 'zaou0515'; 
    const API_KEY = 'yEh5YWV11pGfkdBh3PgNT8uO90TiBqNmSUDU';

    // 2. URLからID（?id=xxxx）を取得
    const params = new URLSearchParams(window.location.search);
    const contentId = params.get('id');

    async function fetchEventDetail() {
      // 3. APIエンドポイントを「event」にして、特定のIDを指定
      const url = `https://${SERVICE_DOMAIN}.microcms.io/api/v1/event/${contentId}`;
      
      try {
        const response = await fetch(url, {
          headers: { 'X-MICROCMS-API-KEY': API_KEY }
        });
        
        if (!response.ok) throw new Error('データが取得できませんでした');
        
        const data = await response.json();

        // 4. HTML要素にデータを流し込む
        // ※microCMSのフィールドIDが title, content, event_date である前提です
        document.getElementById('post-title').textContent = data.title;
        document.getElementById('post-body').innerHTML = data.rich;
        
        // 開催日がある場合（日付形式のフィールドを作った場合）
        if (data.date) {
          const date = new Date(data.date).toLocaleDateString('ja-JP', {
            year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'
          });
          document.getElementById('event-date').textContent = date;
        }

      } catch (error) {
        console.error(error);
        document.getElementById('post-title').textContent = 'イベントが見つかりませんでした';
      }
    }

    // IDが存在する場合のみ実行
    if (contentId) {
      fetchEventDetail();
    } else {
      document.getElementById('post-title').textContent = '不正なアクセスです';
    }
  </script>
</body>
</html>
