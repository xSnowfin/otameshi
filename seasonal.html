<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>詳細ページ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <a href="index.html">← 一覧に戻る</a>
    <article>
      <h1 id="post-title">読み込み中...</h1>
      <hr>
      <div id="post-body" style="margin-top: 20px;"></div>
    </article>
  </main>

  <script>
  const SERVICE_DOMAIN = 'zaou0515'; 
  const API_KEY = 'yEh5YWV11pGfkdBh3PgNT8uO90TiBqNmSUDU';

  const params = new URLSearchParams(window.location.search);
  const contentId = params.get('id');

  async function fetchDetail() {
    // 1. URLを組み立てる
    const url = `https://${SERVICE_DOMAIN}.microcms.io/api/v1/seasonal/${contentId}`;
    
    try {
      const response = await fetch(url, {
        headers: { 'X-MICROCMS-API-KEY': API_KEY }
      });
      
      if (!response.ok) {
        throw new Error('データの取得に失敗しました');
      }

      const data = await response.json();

      // 2. 画面に反映する（ここをmicroCMSのフィールドIDに厳密に合わせました）
      // タイトル: title1
      document.getElementById('post-title').textContent = data.title || 'タイトルなし';
      
      // 本文: text
      // もし本文が表示されない場合は、管理画面で「text」というIDが正しいか再確認してください
      document.getElementById('post-body').innerHTML = data.text || '本文がありません';

    } catch (error) {
      console.error('エラー内容:', error);
      document.getElementById('post-title').textContent = '情報が見つかりませんでした';
    }
  }

  // IDがあるときだけ実行
  if (contentId) {
    fetchDetail();
  } else {
    document.getElementById('post-title').textContent = '記事のIDが見つかりません';
  }
</script>
</body>
</html>
