<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>季節のおすすめ詳細</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* おすすめスポット専用のスタイル */
    .seasonal-header-img {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .access-box {
      background-color: #f0f7ff;
      border-left: 5px solid #3498db;
      padding: 20px;
      margin: 20px 0;
    }
    .access-title {
      font-weight: bold;
      color: #2980b9;
      display: block;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <main class="container">
    <a href="index.html" style="display: inline-block; margin-bottom: 20px;">← 一覧に戻る</a>
    
    <article class="card">
      <h1 id="post-title">読み込み中...</h1>
      
      <img id="post-image" src="" alt="" class="seasonal-header-img" style="display:none;">

      <div id="post-body"></div>

      <div id="access-info" class="access-box" style="display:none;">
        <span class="access-title">📍 アクセス・場所</span>
        <div id="post-access"></div>
      </div>
    </article>
  </main>

  <script>
    const SERVICE_DOMAIN = 'zaou0515'; 
    const API_KEY = 'yEh5YWV11pGfkdBh3PgNT8uO90TiBqNmSUDU';

    const params = new URLSearchParams(window.location.search);
    const contentId = params.get('id');

    async function fetchSeasonalDetail() {
      // エンドポイントを seasonal に指定
      const url = `https://${SERVICE_DOMAIN}.microcms.io/api/v1/seasonal/${contentId}`;
      
      try {
        const response = await fetch(url, {
          headers: { 'X-MICROCMS-API-KEY': API_KEY }
        });
        const data = await response.json();

        // 1. タイトルのセット
        document.getElementById('post-title').textContent = data.title;

        // 2. 画像のセット（画像がある場合）
        if (data.image) {
          const imgTag = document.getElementById('post-image');
          imgTag.src = data.image.url;
          imgTag.style.display = 'block';
        }

        // 3. 本文のセット（フィールドIDが content の前提）
        document.getElementById('post-body').innerHTML = data.content;

        // 4. アクセス情報のセット（もしフィールドIDが access で作成していたら）
        if (data.access) {
          document.getElementById('access-info').style.display = 'block';
          document.getElementById('post-access').textContent = data.access;
        }

      } catch (error) {
        console.error(error);
        document.getElementById('post-title').textContent = '情報が見つかりませんでした';
      }
    }

    if (contentId) {
      fetchSeasonalDetail();
    }
  </script>
</body>
</html>
