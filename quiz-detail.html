<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>クイズ回答</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .choice-btn {
      display: block; width: 100%; padding: 15px; margin: 10px 0;
      background: #fff; border: 2px solid #ddd; border-radius: 8px;
      text-align: left; cursor: pointer; font-size: 1rem; transition: 0.2s;
    }
    .choice-btn:hover:not(:disabled) { background: #f0f8ff; border-color: #3498db; }
    .choice-btn:disabled { cursor: default; opacity: 0.7; }
    #result-area { display: none; margin-top: 20px; padding: 20px; border-radius: 8px; }
    .correct { background: #ffebeb; border: 2px solid #e74c3c; }
    .wrong { background: #e1f5fe; border: 2px solid #3498db; }
  </style>
</head>
<body>
  <main class="container">
    <a href="index.html">← クイズ一覧に戻る</a>
    
    <article class="card">
      <h2 id="quiz-question">問題を読み込み中...</h2>
      
      <div id="choices-container">
        </div>

      <div id="result-area">
        <h3 id="result-status"></h3>
        <p id="result-explanation"></p>
        <button onclick="location.href='index.html'" style="margin-top:10px; padding:10px;">次へ（一覧に戻る）</button>
      </div>
    </article>
  </main>

  <script>
    const SERVICE_DOMAIN = 'zaou0515'; 
    const API_KEY = 'yEh5YWV11pGfkdBh3PgNT8uO90TiBqNmSUDU';

    const params = new URLSearchParams(window.location.search);
    const contentId = params.get('id');

    async function fetchQuizDetail() {
      const url = `https://${SERVICE_DOMAIN}.microcms.io/api/v1/quiz/${contentId}`;
      try {
        const response = await fetch(url, { headers: { 'X-MICROCMS-API-KEY': API_KEY } });
        const data = await response.json();

        document.getElementById('quiz-question').textContent = data.question;

        const container = document.getElementById('choices-container');
        // 3つの選択肢を配列にしてループでボタン作成
        [data.choice1, data.choice2, data.choice3].forEach((choiceText, index) => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.textContent = `${index + 1}. ${choiceText}`;
          btn.onclick = () => checkAnswer(index + 1, data.correct_number, data.explanation);
          container.appendChild(btn);
        });

      } catch (error) { console.error(error); }
    }

    function checkAnswer(selected, correct, explanation) {
      const resultArea = document.getElementById('result-area');
      const status = document.getElementById('result-status');
      const expl = document.getElementById('result-explanation');
      
      // 全ボタンを無効化
      document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

      resultArea.style.display = 'block';
      if (selected == correct) {
        status.textContent = "⭕ 正解！";
        status.style.color = "#e74c3c";
        resultArea.className = "correct";
      } else {
        status.textContent = "❌ 不正解...";
        status.style.color = "#3498db";
        resultArea.className = "wrong";
      }
      expl.textContent = explanation;
    }

    if (contentId) fetchQuizDetail();
  </script>
</body>
</html>
